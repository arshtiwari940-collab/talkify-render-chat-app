services:
  - type: web
    name: talkify-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false          # Set this manually in Render dashboard
      - key: CLIENT_URL
        sync: false          # Your Vercel frontend URL e.g. https://talkify.vercel.app
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false          # Set in Render dashboard
      - key: CLOUDINARY_API_KEY
        sync: false          # Set in Render dashboard
      - key: CLOUDINARY_API_SECRET
        sync: false          # Set in Render dashboard
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false          # Paste full serviceAccountKey.json content as one line
